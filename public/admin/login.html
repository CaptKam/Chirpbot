<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - ChirpBot</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-bolt"></i>
                    <h1>ChirpBot</h1>
                </div>
                <p class="subtitle">Admin Access Panel</p>
            </div>

            <form id="loginForm" class="login-form">
                <div id="errorMessage" class="error-message" style="display: none;">
                    Invalid credentials. Please try again.
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            placeholder="Enter your username" 
                            required
                            data-testid="input-username"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Enter your password" 
                            required
                            data-testid="input-password"
                        >
                        <button type="button" class="toggle-password" onclick="togglePassword()" data-testid="button-toggle-password">
                            <i class="fas fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="loginBtn" data-testid="button-login">
                    <i class="fas fa-sign-in-alt"></i>
                    Sign In
                </button>
            </form>

            <div class="login-footer">
                <div class="security-notice">
                    <i class="fas fa-shield-alt"></i>
                    <span>Secure admin access</span>
                </div>
                <a href="/" class="back-link" data-testid="link-back">
                    <i class="fas fa-arrow-left"></i>
                    Back to main app
                </a>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
