<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin System Test</title>
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .test-item {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .pass { background: #d4edda; color: #155724; }
        .fail { background: #f8d7da; color: #721c24; }
        .pending { background: #fff3cd; color: #856404; }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>Admin System Test Suite</h1>
    <p>This page tests all admin endpoints and functionality</p>
    
    <button onclick="runAllTests()">Run All Tests</button>
    <button onclick="clearResults()">Clear Results</button>
    
    <div id="testResults"></div>
    
    <script>
        const tests = [
            {
                name: 'Authentication Check',
                endpoint: '/api/admin-auth/verify',
                method: 'GET',
                expectedStatus: [200, 401]
            },
            {
                name: 'Admin Stats',
                endpoint: '/api/admin/stats',
                method: 'GET',
                expectedStatus: [200, 401]
            },
            {
                name: 'System Status',
                endpoint: '/api/admin/system-status',
                method: 'GET',
                expectedStatus: [200, 401]
            },
            {
                name: 'User List',
                endpoint: '/api/admin/users',
                method: 'GET',
                expectedStatus: [200, 401]
            },
            {
                name: 'Global Alert Settings',
                endpoint: '/api/admin/global-alert-settings/MLB',
                method: 'GET',
                expectedStatus: [200, 401]
            }
        ];
        
        async function runTest(test) {
            try {
                const response = await fetch(test.endpoint, {
                    method: test.method,
                    credentials: 'include'
                });
                
                const success = test.expectedStatus.includes(response.status);
                const data = await response.json().catch(() => null);
                
                return {
                    name: test.name,
                    success,
                    status: response.status,
                    message: success ? 'Endpoint accessible' : 'Unexpected status',
                    data: data
                };
            } catch (error) {
                return {
                    name: test.name,
                    success: false,
                    status: 0,
                    message: error.message,
                    data: null
                };
            }
        }
        
        async function runAllTests() {
            const resultsDiv = document.getElementById('testResults');
            resultsDiv.innerHTML = '<h2>Test Results</h2>';
            
            for (const test of tests) {
                const result = await runTest(test);
                const className = result.success ? 'pass' : 'fail';
                
                resultsDiv.innerHTML += `
                    <div class="test-item ${className}">
                        <h3>${result.name}</h3>
                        <p>Status: ${result.status} - ${result.message}</p>
                        ${result.data ? `<pre>${JSON.stringify(result.data, null, 2)}</pre>` : ''}
                    </div>
                `;
            }
        }
        
        function clearResults() {
            document.getElementById('testResults').innerHTML = '';
        }
        
        // Auto-run tests on load
        window.addEventListener('DOMContentLoaded', runAllTests);
    </script>
</body>
</html>
