<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        console.error('Global error:', {
          message: msg,
          source: url,
          lineno: lineNo,
          colno: columnNo,
          error: error ? error.stack : 'No stack'
        });
        document.getElementById('root').innerHTML = '<pre style="white-space:pre-wrap;font:14px/1.4 monospace;padding:20px;background:#1E293B;color:#EF4444;margin:20px;border-radius:12px">' +
          'ERROR: ' + msg + '\n\nStack:\n' + (error ? error.stack : 'No stack available') + '</pre>';
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        console.error('Unhandled promise rejection:', event.reason);
      });
      if (navigator.serviceWorker) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (const registration of registrations) {
            registration.unregister();
          }
        });
        if (window.caches && window.caches.keys) {
          caches.keys().then(function(keys) {
            keys.forEach(function(key) {
              caches.delete(key);
            });
          });
        }
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
